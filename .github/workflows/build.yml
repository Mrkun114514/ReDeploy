name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - neoforge-1.21.8
          - fabric-1.21.8
          - neoforge-1.21.1
          - fabric-1.21.1
          - fabric-1.20.1
          - neoforge-1.20.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # neoForge-1.20.1 uses the ForgeGradle-era NeoGradle 6.x, which does NOT
      # run on JDK 21. All other milestones build on JDK 21 (their Java 17 target
      # is expressed via `options.release`, not the running JDK).
      - name: Set up JDK 21
        if: ${{ matrix.module != 'neoforge-1.20.1' }}
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up JDK 17 (neoForge-1.20.1 only)
        if: ${{ matrix.module == 'neoforge-1.20.1' }}
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ${{ matrix.module }}/gradlew

      - name: Build ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: ./gradlew build --stacktrace

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: redeploy-${{ matrix.module }}
          path: ${{ matrix.module }}/build/libs/*.jar
